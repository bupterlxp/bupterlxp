<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 24" width="1200" height="24" fill="none">
  <defs>
    <linearGradient id="dl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00f0ff" stop-opacity="0"/><stop offset="0.5" stop-color="#a855f7" stop-opacity="0.9"/><stop offset="1" stop-color="#ff00e5" stop-opacity="0"/>
    </linearGradient>
    <filter id="dg" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="0" y="11" width="1200" height="2" fill="url(#dl)"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/></rect>
  <circle cx="0" cy="12" r="3.5" fill="#00f0ff" filter="url(#dg)"><animate attributeName="cx" values="-20;1220" dur="4.5s" repeatCount="indefinite"/></circle>
  <g fill="#a855f7" filter="url(#dg)">
    <rect x="592" y="6" width="6" height="6" transform="rotate(45 600 12)"/>
  </g>
</svg>
