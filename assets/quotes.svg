<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 120" width="1000" height="120" fill="none" font-family="'Courier New',monospace">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#00f0ff"/><stop offset="0.5" stop-color="#a855f7"/><stop offset="1" stop-color="#ff00e5"/></linearGradient>
    <filter id="fs" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="1.3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>.bg{fill:#07070d}.q{fill:#cfe3ff}
      @media (prefers-color-scheme: light){.bg{fill:#f4f8fe}.q{fill:#1f2d44}}</style>
  </defs>
  <rect class="bg" x="3" y="3" width="994" height="114" rx="14" fill="#07070d" stroke="url(#g1)" stroke-width="2"/>
  <text x="30" y="40" font-size="30" font-weight="bold" fill="url(#g1)" filter="url(#fs)">“</text>
  <g class="q" font-size="17" fill="#cfe3ff" text-anchor="middle">
    <text x="500" y="68" opacity="0">让模型不只是会聊天，而是会干活。<animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.18;0.2;1" dur="20s" begin="0s" repeatCount="indefinite"/></text>
    <text x="500" y="68" opacity="0">The best agent is one you forget is an agent.<animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.18;0.2;1" dur="20s" begin="4s" repeatCount="indefinite"/></text>
    <text x="500" y="68" opacity="0">Ideas are cheap; verified ideas are gold.<animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.18;0.2;1" dur="20s" begin="8s" repeatCount="indefinite"/></text>
    <text x="500" y="68" opacity="0">while not done: research() &amp;&amp; ship()<animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.18;0.2;1" dur="20s" begin="12s" repeatCount="indefinite"/></text>
    <text x="500" y="68" opacity="0">Ship the paper. Then ship the code.<animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.18;0.2;1" dur="20s" begin="16s" repeatCount="indefinite"/></text>
  </g>
  <text x="970" y="104" text-anchor="end" font-size="12" fill="#a855f7">— Xinping Lei</text>
</svg>
