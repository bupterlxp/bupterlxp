      <circle cx="128.8" cy="147.35" r="3.5" fill="#ff00e5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1.5s" repeatCount="indefinite"/></circle>
    </g>
    <g font-size="14" font-weight="bold" class="txt" fill="#cfe3ff">
