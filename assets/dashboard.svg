    <rect x="40" y="624" height="6" rx="3" fill="#16263f"/><rect x="40" y="624" height="6" rx="3" fill="url(#g1)"><animate attributeName="width" from="0" to="217" dur="1.3s" begin="0.8s" fill="freeze"/></rect>
    <text x="350" y="576" class="lbl" font-size="13" fill="#7fdfff" letter-spacing="1">TOTAL STARS</text>
    <text x="350" y="612" font-size="34" fill="#a855f7" filter="url(#fg)">2</text>
    <rect x="350" y="624" height="6" rx="3" fill="#16263f"/><rect x="350" y="624" height="6" rx="3" fill="url(#g1)"><animate attributeName="width" from="0" to="50" dur="1.3s" begin="1s" fill="freeze"/></rect>
