      <path d="M150,214 L96,250 C72,274 66,302 66,440 L294,440 C294,302 288,274 264,250 L210,214 Z" fill="#1b2c52" stroke="#2a3f6e" stroke-width="2"/>
      <path d="M138,210 C150,250 210,250 222,210 C214,236 146,236 138,210 Z" fill="#14213f"/>
      <path d="M152,214 Q180,242 208,214" fill="none" stroke="#14213f" stroke-width="6" stroke-linecap="round"/>
