      <path d="M116,116 C100,150 102,188 120,210 L142,200 C128,176 128,142 140,118 Z" fill="#14142a"/>
      <path d="M244,116 C260,150 258,188 240,210 L218,200 C232,176 232,142 220,118 Z" fill="#14142a"/>
      <ellipse cx="180" cy="152" rx="56" ry="58" fill="#f6cda8"/>
      <circle cx="126" cy="160" r="10" fill="#f0c098"/><circle cx="234" cy="160" r="10" fill="#f0c098"/>
      <circle cx="142" cy="176" r="11" fill="#ff8fb0" opacity="0.30"/><circle cx="218" cy="176" r="11" fill="#ff8fb0" opacity="0.30"/>
      <path d="M112,154 Q110,94 180,88 Q250,94 248,154 Q244,118 218,108 Q230,144 208,154 Q206,112 182,106 Q193,146 168,154 Q166,110 146,112 Q149,144 134,154 Q127,120 112,154 Z" fill="#14142a"/>
      <path d="M150,110 Q136,134 128,156" fill="none" stroke="#00f0ff" stroke-width="1.6" opacity="0.75"/>
      <path d="M182,102 Q180,128 180,150" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.65"/>
      <path d="M214,108 Q226,132 232,156" fill="none" stroke="#ff00e5" stroke-width="1.6" opacity="0.65"/>
      <path d="M138,140 Q150,135 162,139" stroke="#23233b" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M198,139 Q210,135 222,140" stroke="#23233b" stroke-width="3" fill="none" stroke-linecap="round"/>
      <g>
        <ellipse cx="150" cy="158" rx="10" ry="8" fill="#ffffff"/><ellipse cx="210" cy="158" rx="10" ry="8" fill="#ffffff"/>
        <circle cx="152" cy="159" r="4.5" fill="#1a1a2e"/><circle cx="212" cy="159" r="4.5" fill="#1a1a2e"/>
        <circle cx="153.5" cy="157" r="1.6" fill="#fff"/><circle cx="213.5" cy="157" r="1.6" fill="#fff"/>
        <ellipse cx="150" cy="158" rx="11" ry="0" fill="#f6cda8"><animate attributeName="ry" values="0;0;9;0;0" keyTimes="0;0.92;0.95;0.98;1" dur="4.5s" repeatCount="indefinite"/></ellipse>
        <ellipse cx="210" cy="158" rx="11" ry="0" fill="#f6cda8"><animate attributeName="ry" values="0;0;9;0;0" keyTimes="0;0.92;0.95;0.98;1" dur="4.5s" repeatCount="indefinite"/></ellipse>
      </g>
      <g stroke="#00f0ff" stroke-width="2.6" fill="#0a1828" fill-opacity="0.18" filter="url(#fs)"><rect x="130" y="144" width="42" height="30" rx="9"/><rect x="188" y="144" width="42" height="30" rx="9"/></g>
      <line x1="172" y1="153" x2="188" y2="153" stroke="#00f0ff" stroke-width="2.6"/>
      <line x1="130" y1="150" x2="118" y2="156" stroke="#00f0ff" stroke-width="2.6"/>
      <line x1="230" y1="150" x2="242" y2="156" stroke="#00f0ff" stroke-width="2.6"/>
      <path d="M180,166 l-3,11 q3,3 6,0" fill="none" stroke="#d9a47e" stroke-width="2" stroke-linecap="round"/>
      <path d="M166,186 Q180,197 194,186" fill="none" stroke="#b5654a" stroke-width="3" stroke-linecap="round"/>
      <path d="M110,156 C110,80 250,80 250,156" fill="none" stroke="#23233b" stroke-width="10" stroke-linecap="round"/>
      <rect x="102" y="146" width="26" height="42" rx="11" fill="#23233b" stroke="#ff00e5" stroke-width="2"/>
      <rect x="232" y="146" width="26" height="42" rx="11" fill="#23233b" stroke="#00f0ff" stroke-width="2"/>
      <!-- 🎓 graduation cap (PhD) -->
