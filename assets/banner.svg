      <line x1="168" y1="236" x2="166" y2="300" stroke="#cfe3ff" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="192" y1="236" x2="194" y2="300" stroke="#cfe3ff" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="166" cy="302" r="3" fill="#00f0ff"/><circle cx="194" cy="302" r="3" fill="#ff00e5"/>
      <polygon points="180,326 196,336 196,356 180,366 164,356 164,336" fill="#0b1530" stroke="url(#g1)" stroke-width="1.8" filter="url(#fs)"/>
