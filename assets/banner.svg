      <polygon points="180,64 244,78 180,92 116,78" fill="#1f1f3d"/>
      <circle cx="180" cy="78" r="4" fill="#ffd23f"/>
      <path d="M180,78 L216,86 L216,116" fill="none" stroke="#ffd23f" stroke-width="2.2"><animate attributeName="d" values="M180,78 L216,86 L216,116;M180,78 L216,86 L210,118;M180,78 L216,86 L216,116" dur="3s" repeatCount="indefinite"/></path>
