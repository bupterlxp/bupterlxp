<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" fill="none">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00f0ff"/><stop offset="0.5" stop-color="#a855f7"/><stop offset="1" stop-color="#ff00e5"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00f0ff" stop-opacity="0"/><stop offset="0.5" stop-color="#00f0ff" stop-opacity="0.5"/><stop offset="1" stop-color="#00f0ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.75">
      <stop offset="0.55" stop-color="#07070d" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 L0 0 0 40" fill="none" stroke="#10203a" stroke-width="1"/></pattern>
  </defs>

  <rect width="1200" height="320" fill="#07070d"/>
  <rect width="1200" height="320" fill="url(#grid)"/>

  <!-- starfield -->
  <g fill="#00f0ff">
    <circle cx="90" cy="40" r="1.6"><animate attributeName="opacity" values="0.1;1;0.1" dur="3s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="60" r="1.2" fill="#ff00e5"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="360" cy="35" r="1.4"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.6s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="50" r="1.5" fill="#a855f7"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="1110" cy="70" r="1.2"><animate attributeName="opacity" values="0.1;1;0.1" dur="3.2s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="30" r="1.3" fill="#ff00e5"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.6s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="285" r="1.4" fill="#a855f7"><animate attributeName="opacity" values="0.1;1;0.1" dur="3.4s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="295" r="1.2"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.9s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="290" r="1.5" fill="#ff00e5"><animate attributeName="opacity" values="0.1;1;0.1" dur="3.1s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="280" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="60" cy="160" r="1.2"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="3.8s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="160" r="1.3" fill="#a855f7"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" begin="1.3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- moving scan band -->
  <rect x="-320" y="0" width="320" height="320" fill="url(#scan)" opacity="0.18"><animate attributeName="x" values="-320;1200" dur="6s" repeatCount="indefinite"/></rect>

  <!-- neon borders -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#neon)"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/></rect>
  <rect x="0" y="317" width="1200" height="3" fill="url(#neon)"><animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/></rect>

  <!-- HUD corners -->
  <g stroke="#00f0ff" stroke-width="2.5" fill="none" filter="url(#soft)">
    <path d="M24 66 L24 26 L66 26"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/></path>
    <path d="M1176 66 L1176 26 L1134 26"><animate attributeName="opacity" values="1;0.5;1" dur="2.2s" repeatCount="indefinite"/></path>
    <path d="M24 254 L24 294 L66 294"><animate attributeName="opacity" values="1;0.5;1" dur="2.2s" repeatCount="indefinite"/></path>
    <path d="M1176 254 L1176 294 L1134 294"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/></path>
  </g>

  <!-- chromatic aberration title -->
  <text x="597" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="76" font-weight="bold" fill="#00f0ff" opacity="0.45" filter="url(#soft)" letter-spacing="8">XINPING LEI</text>
  <text x="603" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="76" font-weight="bold" fill="#ff00e5" opacity="0.45" filter="url(#soft)" letter-spacing="8">XINPING LEI</text>
  <text x="600" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="76" font-weight="bold" fill="url(#neon)" filter="url(#glow)" letter-spacing="8">XINPING LEI<animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/></text>

  <!-- subtitle -->
  <text x="600" y="200" text-anchor="middle" font-family="'Courier New',monospace" font-size="22" font-weight="bold" fill="#00f0ff" filter="url(#soft)" letter-spacing="6">&gt;_ LLM · AGENT · RESEARCHER @ BUPT</text>

  <!-- animated underline -->
  <rect x="450" y="216" height="2" fill="url(#neon)" filter="url(#soft)"><animate attributeName="width" values="0;300" dur="1.4s" begin="0.3s" fill="freeze"/><animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" begin="1.7s" repeatCount="indefinite"/><set attributeName="x" to="450"/></rect>

  <!-- tagline -->
  <text x="600" y="252" text-anchor="middle" font-family="'Courier New',monospace" font-size="14" fill="#ff4fd8" letter-spacing="4" opacity="0.85">Multi-Agent · Agentic Coding · Reasoning · Idea Generation</text>

  <rect width="1200" height="320" fill="url(#vig)"/>
</svg>
