  <!-- ============ RIGHT: TITLE ============ -->
  <g clip-path="url(#wipe)">
    <text x="757" y="180" text-anchor="middle" font-size="70" font-weight="bold" fill="#00f0ff" opacity="0.45" filter="url(#fs)" letter-spacing="7">XINPING LEI</text>
    <text x="763" y="180" text-anchor="middle" font-size="70" font-weight="bold" fill="#ff00e5" opacity="0.45" filter="url(#fs)" letter-spacing="7">XINPING LEI</text>
    <text class="ttl" x="760" y="180" text-anchor="middle" font-size="70" font-weight="bold" fill="url(#g1)" filter="url(#fg)" letter-spacing="7">XINPING LEI<animate attributeName="opacity" values="0.8;1;0.8" dur="2s" begin="1.5s" repeatCount="indefinite"/></text>
  </g>
  <text class="sub" x="760" y="226" text-anchor="middle" font-size="21" font-weight="bold" fill="#00f0ff" filter="url(#fs)" letter-spacing="5" opacity="0">&gt;_ LLM · AGENT · RESEARCHER @ BUPT<animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.5s" fill="freeze"/></text>
  <rect x="610" y="242" width="0" height="2" fill="url(#g1)" filter="url(#fs)"><animate attributeName="width" from="0" to="300" dur="1s" begin="1.7s" fill="freeze"/></rect>
  <text x="760" y="276" text-anchor="middle" font-size="14" fill="#ff4fd8" letter-spacing="3" opacity="0">Multi-Agent · Agentic Coding · Reasoning · Idea Generation<animate attributeName="opacity" from="0" to="0.85" dur="0.6s" begin="2.1s" fill="freeze"/></text>
  <text x="760" y="312" text-anchor="middle" font-size="14" font-weight="bold" fill="#28c840" filter="url(#fs)" opacity="0">🎓 Incoming PhD · NJU × ZGC Academy · 2026.09<animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="2.5s" fill="freeze"/></text>

  <!-- ⚽ spinning ball + score easter egg -->
  <g filter="url(#fs)">
    <g transform="translate(1110,66)">
      <circle r="15" fill="#ffffff" stroke="#0a0a12" stroke-width="1.5"/>
      <polygon points="0,-7 7,-2 4,7 -4,7 -7,-2" fill="#0a0a12"/>
      <line x1="0" y1="-7" x2="0" y2="-15" stroke="#0a0a12" stroke-width="1.2"/><line x1="7" y1="-2" x2="14" y2="-7" stroke="#0a0a12" stroke-width="1.2"/><line x1="4" y1="7" x2="9" y2="13" stroke="#0a0a12" stroke-width="1.2"/><line x1="-4" y1="7" x2="-9" y2="13" stroke="#0a0a12" stroke-width="1.2"/><line x1="-7" y1="-2" x2="-14" y2="-7" stroke="#0a0a12" stroke-width="1.2"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="7s" repeatCount="indefinite" additive="sum"/>
    </g>
    <text x="1110" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#28c840">AGENTS 3 - 0 BUGS</text>
  </g>

  <!-- 🥅 goal + shot animation -->
  <g stroke-linecap="round">
    <g stroke="#dfe9ff" stroke-width="2.4" fill="none"><path d="M40 372 L40 340 L108 340 L108 372"/></g>
    <g stroke="#3a557e" stroke-width="0.8" opacity="0.8"><line x1="40" y1="349" x2="108" y2="349"/><line x1="40" y1="358" x2="108" y2="358"/><line x1="40" y1="367" x2="108" y2="367"/><line x1="52" y1="340" x2="52" y2="372"/><line x1="64" y1="340" x2="64" y2="372"/><line x1="76" y1="340" x2="76" y2="372"/><line x1="88" y1="340" x2="88" y2="372"/><line x1="96" y1="340" x2="96" y2="372"/></g>
    <circle r="5" fill="#ffffff" stroke="#0a0a12" stroke-width="1">
      <animate attributeName="cx" values="220;74;74;220;220" keyTimes="0;0.4;0.9;0.92;1" dur="3.4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="368;356;356;368;368" keyTimes="0;0.4;0.9;0.92;1" dur="3.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;1;0;1" keyTimes="0;0.4;0.9;0.92;1" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <text x="74" y="332" text-anchor="middle" font-size="13" font-weight="bold" fill="#28c840" opacity="0">GOAL!<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.4;0.42;0.86;0.9;1" dur="3.4s" repeatCount="indefinite"/></text>
  </g>

  <rect class="vig" width="1200" height="380" fill="url(#vig)"/>
</svg>
