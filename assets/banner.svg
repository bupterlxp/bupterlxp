      <text x="288" y="124" font-size="20" fill="#ff00e5" opacity="0.85">{ }<animateTransform attributeName="transform" type="translate" values="0 0;0 7;0 0" dur="4.2s" repeatCount="indefinite"/></text>
      <text x="300" y="256" font-size="16" fill="#a855f7" opacity="0.85">AI<animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0" dur="3.8s" repeatCount="indefinite"/></text>
      <text x="40" y="256" font-size="22" fill="#a855f7" opacity="0.8">λ<animateTransform attributeName="transform" type="translate" values="0 0;0 6;0 0" dur="4.6s" repeatCount="indefinite"/></text>
    </g>
