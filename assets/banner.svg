<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" fill="none">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#00f0ff"/><stop offset="0.5" stop-color="#a855f7"/><stop offset="1" stop-color="#ff00e5"/></linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#00f0ff" stop-opacity="0"/><stop offset="0.5" stop-color="#00f0ff" stop-opacity="0.5"/><stop offset="1" stop-color="#00f0ff" stop-opacity="0"/></linearGradient>
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.75"><stop offset="0.55" stop-color="#07070d" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity="0.7"/></radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 L0 0 0 40" fill="none" stroke="#10203a" stroke-width="1"/></pattern>
    <clipPath id="wipe"><rect x="0" y="80" width="0" height="160"><animate attributeName="width" from="0" to="1200" dur="1.3s" begin="0.2s" fill="freeze"/></rect></clipPath>
  </defs>

  <rect width="1200" height="320" fill="#07070d"/>
  <rect width="1200" height="320" fill="url(#grid)"/>

  <!-- matrix code rain -->
  <g font-family="'Courier New',monospace" font-size="15" fill="#19c39a" opacity="0.16">
    <text x="120" y="0">1<tspan x="120" dy="18">0</tspan><tspan x="120" dy="18">1</tspan><tspan x="120" dy="18">1</tspan><tspan x="120" dy="18">0</tspan><tspan x="120" dy="18">0</tspan><tspan x="120" dy="18">1</tspan><tspan x="120" dy="18">0</tspan><animateTransform attributeName="transform" type="translate" from="0 -180" to="0 340" dur="5s" begin="0s" repeatCount="indefinite"/></text>
    <text x="320" y="0">0<tspan x="320" dy="18">1</tspan><tspan x="320" dy="18">1</tspan><tspan x="320" dy="18">0</tspan><tspan x="320" dy="18">1</tspan><tspan x="320" dy="18">0</tspan><tspan x="320" dy="18">1</tspan><animateTransform attributeName="transform" type="translate" from="0 -200" to="0 340" dur="6.5s" begin="1s" repeatCount="indefinite"/></text>
    <text x="540" y="0">1<tspan x="540" dy="18">1</tspan><tspan x="540" dy="18">0</tspan><tspan x="540" dy="18">1</tspan><tspan x="540" dy="18">0</tspan><tspan x="540" dy="18">1</tspan><tspan x="540" dy="18">1</tspan><tspan x="540" dy="18">0</tspan><animateTransform attributeName="transform" type="translate" from="0 -160" to="0 340" dur="5.8s" begin="0.5s" repeatCount="indefinite"/></text>
    <text x="760" y="0">0<tspan x="760" dy="18">0</tspan><tspan x="760" dy="18">1</tspan><tspan x="760" dy="18">0</tspan><tspan x="760" dy="18">1</tspan><tspan x="760" dy="18">1</tspan><animateTransform attributeName="transform" type="translate" from="0 -180" to="0 340" dur="7s" begin="1.6s" repeatCount="indefinite"/></text>
    <text x="980" y="0">1<tspan x="980" dy="18">0</tspan><tspan x="980" dy="18">1</tspan><tspan x="980" dy="18">0</tspan><tspan x="980" dy="18">0</tspan><tspan x="980" dy="18">1</tspan><tspan x="980" dy="18">0</tspan><animateTransform attributeName="transform" type="translate" from="0 -200" to="0 340" dur="5.4s" begin="0.8s" repeatCount="indefinite"/></text>
    <text x="1090" y="0">0<tspan x="1090" dy="18">1</tspan><tspan x="1090" dy="18">0</tspan><tspan x="1090" dy="18">1</tspan><tspan x="1090" dy="18">1</tspan><tspan x="1090" dy="18">0</tspan><animateTransform attributeName="transform" type="translate" from="0 -160" to="0 340" dur="6.2s" begin="2s" repeatCount="indefinite"/></text>
  </g>

  <!-- moving scan band -->
  <rect x="-320" y="0" width="320" height="320" fill="url(#scan)" opacity="0.18"><animate attributeName="x" values="-320;1200" dur="6s" repeatCount="indefinite"/></rect>

  <!-- neon borders -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#neon)"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/></rect>
  <rect x="0" y="317" width="1200" height="3" fill="url(#neon)"><animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/></rect>

  <!-- HUD corners -->
  <g stroke="#00f0ff" stroke-width="2.5" fill="none" filter="url(#soft)">
    <path d="M24 66 L24 26 L66 26"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/></path>
    <path d="M1176 66 L1176 26 L1134 26"><animate attributeName="opacity" values="1;0.5;1" dur="2.2s" repeatCount="indefinite"/></path>
    <path d="M24 254 L24 294 L66 294"><animate attributeName="opacity" values="1;0.5;1" dur="2.2s" repeatCount="indefinite"/></path>
    <path d="M1176 254 L1176 294 L1134 294"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/></path>
  </g>

  <!-- title group with wipe-in reveal -->
  <g clip-path="url(#wipe)">
    <text x="597" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="76" font-weight="bold" fill="#00f0ff" opacity="0.45" filter="url(#soft)" letter-spacing="8">XINPING LEI</text>
    <text x="603" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="76" font-weight="bold" fill="#ff00e5" opacity="0.45" filter="url(#soft)" letter-spacing="8">XINPING LEI</text>
    <text x="600" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="76" font-weight="bold" fill="url(#neon)" filter="url(#glow)" letter-spacing="8">XINPING LEI<animate attributeName="opacity" values="0.8;1;0.8" dur="2s" begin="1.5s" repeatCount="indefinite"/></text>
  </g>

  <!-- subtitle -->
  <text x="600" y="200" text-anchor="middle" font-family="'Courier New',monospace" font-size="22" font-weight="bold" fill="#00f0ff" filter="url(#soft)" letter-spacing="6" opacity="0">&gt;_ LLM · AGENT · RESEARCHER @ BUPT<animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.5s" fill="freeze"/></text>

  <!-- animated underline -->
  <rect x="450" y="216" width="0" height="2" fill="url(#neon)" filter="url(#soft)"><animate attributeName="width" from="0" to="300" dur="1s" begin="1.7s" fill="freeze"/></rect>

  <!-- tagline -->
  <text x="600" y="252" text-anchor="middle" font-family="'Courier New',monospace" font-size="14" fill="#ff4fd8" letter-spacing="4" opacity="0">Multi-Agent · Agentic Coding · Reasoning · Idea Generation<animate attributeName="opacity" from="0" to="0.85" dur="0.6s" begin="2.1s" fill="freeze"/></text>

  <rect width="1200" height="320" fill="url(#vig)"/>
</svg>
