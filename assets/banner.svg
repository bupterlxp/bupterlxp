    <circle cx="180" cy="208" r="140" fill="none" stroke="#00f0ff" stroke-width="1" stroke-dasharray="2 28" opacity="0.4"><animateTransform attributeName="transform" type="rotate" from="360 180 208" to="0 180 208" dur="26s" repeatCount="indefinite"/></circle>
    <g font-weight="bold" filter="url(#fs)">
