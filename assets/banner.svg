<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" fill="none">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00f0ff"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#ff00e5"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00f0ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00f0ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#00f0ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#11223a" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background + grid -->
  <rect width="1200" height="300" fill="#07070d"/>
  <rect width="1200" height="300" fill="url(#grid)"/>

  <!-- moving scan band -->
  <rect x="-320" y="0" width="320" height="300" fill="url(#scan)" opacity="0.22">
    <animate attributeName="x" values="-320;1200" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- top / bottom neon borders -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#neon)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="297" width="1200" height="3" fill="url(#neon)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- HUD corner brackets -->
  <g stroke="#00f0ff" stroke-width="2.5" fill="none" filter="url(#soft)">
    <path d="M24 62 L24 24 L62 24">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M1176 62 L1176 24 L1138 24">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M24 238 L24 276 L62 276">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M1176 238 L1176 276 L1138 276">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- chromatic-aberration shadows -->
  <text x="597" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="74" font-weight="bold" fill="#00f0ff" opacity="0.45" filter="url(#soft)" letter-spacing="8">XINPING LEI</text>
  <text x="603" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="74" font-weight="bold" fill="#ff00e5" opacity="0.45" filter="url(#soft)" letter-spacing="8">XINPING LEI</text>

  <!-- main title -->
  <text x="600" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="74" font-weight="bold" fill="url(#neon)" filter="url(#glow)" letter-spacing="8">
    XINPING LEI
    <animate attributeName="opacity" values="0.78;1;0.78" dur="2s" repeatCount="indefinite"/>
  </text>

  <!-- subtitle -->
  <text x="600" y="200" text-anchor="middle" font-family="'Courier New',monospace" font-size="23" font-weight="bold" fill="#00f0ff" filter="url(#soft)" letter-spacing="6">&gt; LLM · AGENT · RESEARCHER @ BUPT</text>

  <!-- tagline -->
  <text x="600" y="240" text-anchor="middle" font-family="'Courier New',monospace" font-size="15" fill="#ff4fd8" letter-spacing="4" opacity="0.85">Multi-Agent · Agentic Coding · Reasoning · Idea Generation</text>
</svg>
