<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380" fill="none" font-family="'Courier New',monospace">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#00f0ff"/><stop offset="0.5" stop-color="#a855f7"/><stop offset="1" stop-color="#ff00e5"/></linearGradient>
    <linearGradient id="g1d" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#0a8fb0"/><stop offset="0.5" stop-color="#7c3aed"/><stop offset="1" stop-color="#c026a8"/></linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#00f0ff" stop-opacity="0"/><stop offset="0.5" stop-color="#00f0ff" stop-opacity="0.5"/><stop offset="1" stop-color="#00f0ff" stop-opacity="0"/></linearGradient>
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.75"><stop offset="0.55" stop-color="#07070d" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity="0.7"/></radialGradient>
    <radialGradient id="spot" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#1b2c52" stop-opacity="0.9"/><stop offset="1" stop-color="#07070d" stop-opacity="0"/></radialGradient>
    <filter id="fg" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="fs" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="1.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path class="grd" d="M40 0 L0 0 0 40" fill="none" stroke="#10203a" stroke-width="1"/></pattern>
    <clipPath id="wipe"><rect x="360" y="120" width="0" height="190"><animate attributeName="width" from="0" to="840" dur="1.3s" begin="0.3s" fill="freeze"/></rect></clipPath>
    <style>
      .bg{fill:#07070d}.grd{stroke:#10203a}.vig{opacity:1}.sub{fill:#00f0ff}
      @media (prefers-color-scheme: light){
        .bg{fill:#eaf1fb}.grd{stroke:#cfdcf0}.vig{opacity:0}.sub{fill:#0b6e8c}.ttl{fill:url(#g1d)}
      }
    </style>
  </defs>

  <rect class="bg" width="1200" height="380" fill="#07070d"/>
  <rect width="1200" height="380" fill="url(#grid)"/>

  <!-- matrix rain -->
  <g font-size="15" fill="#19c39a" opacity="0.12">
    <text x="520" y="0">1<tspan x="520" dy="18">0</tspan><tspan x="520" dy="18">1</tspan><tspan x="520" dy="18">1</tspan><tspan x="520" dy="18">0</tspan><tspan x="520" dy="18">1</tspan><animateTransform attributeName="transform" type="translate" from="0 -160" to="0 400" dur="5.5s" repeatCount="indefinite"/></text>
    <text x="720" y="0">0<tspan x="720" dy="18">1</tspan><tspan x="720" dy="18">0</tspan><tspan x="720" dy="18">1</tspan><tspan x="720" dy="18">1</tspan><animateTransform attributeName="transform" type="translate" from="0 -200" to="0 400" dur="6.8s" begin="1s" repeatCount="indefinite"/></text>
    <text x="930" y="0">1<tspan x="930" dy="18">1</tspan><tspan x="930" dy="18">0</tspan><tspan x="930" dy="18">0</tspan><tspan x="930" dy="18">1</tspan><animateTransform attributeName="transform" type="translate" from="0 -180" to="0 400" dur="6s" begin="0.6s" repeatCount="indefinite"/></text>
  </g>

  <!-- scan band -->
  <rect x="-320" y="0" width="320" height="380" fill="url(#scan)" opacity="0.16"><animate attributeName="x" values="-320;1200" dur="6s" repeatCount="indefinite"/></rect>

  <!-- borders -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#g1)"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/></rect>
  <rect x="0" y="377" width="1200" height="3" fill="url(#g1)"><animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/></rect>

  <!-- ⚑ flag bunting (waving) -->
  <line x1="40" y1="9" x2="1010" y2="9" stroke="#3a4a66" stroke-width="1.5"/>
  <g>
    <g><animateTransform attributeName="transform" type="rotate" values="-5 100 9;5 100 9;-5 100 9" dur="3s" begin="0s" repeatCount="indefinite"/><polygon points="78,9 122,9 100,40" fill="#ff4d4d"/></g>
    <g><animateTransform attributeName="transform" type="rotate" values="5 200 9;-5 200 9;5 200 9" dur="3.2s" begin="0.2s" repeatCount="indefinite"/><polygon points="178,9 222,9 200,40" fill="#ffd23f"/></g>
    <g><animateTransform attributeName="transform" type="rotate" values="-5 300 9;5 300 9;-5 300 9" dur="3.1s" begin="0.4s" repeatCount="indefinite"/><polygon points="278,9 322,9 300,40" fill="#28c840"/></g>
    <g><animateTransform attributeName="transform" type="rotate" values="5 400 9;-5 400 9;5 400 9" dur="3.3s" begin="0.6s" repeatCount="indefinite"/><polygon points="378,9 422,9 400,40" fill="#00f0ff"/></g>
    <g><animateTransform attributeName="transform" type="rotate" values="-5 500 9;5 500 9;-5 500 9" dur="3s" begin="0.8s" repeatCount="indefinite"/><polygon points="478,9 522,9 500,40" fill="#a855f7"/></g>
    <g><animateTransform attributeName="transform" type="rotate" values="5 600 9;-5 600 9;5 600 9" dur="3.2s" begin="1s" repeatCount="indefinite"/><polygon points="578,9 622,9 600,40" fill="#ff00e5"/></g>
    <g><animateTransform attributeName="transform" type="rotate" values="-5 700 9;5 700 9;-5 700 9" dur="3.1s" begin="1.2s" repeatCount="indefinite"/><polygon points="678,9 722,9 700,40" fill="#ff4d4d"/></g>
    <g><animateTransform attributeName="transform" type="rotate" values="5 800 9;-5 800 9;5 800 9" dur="3.3s" begin="1.4s" repeatCount="indefinite"/><polygon points="778,9 822,9 800,40" fill="#ffd23f"/></g>
    <g><animateTransform attributeName="transform" type="rotate" values="-5 900 9;5 900 9;-5 900 9" dur="3s" begin="1.6s" repeatCount="indefinite"/><polygon points="878,9 922,9 900,40" fill="#28c840"/></g>
    <g><animateTransform attributeName="transform" type="rotate" values="5 1000 9;-5 1000 9;5 1000 9" dur="3.2s" begin="1.8s" repeatCount="indefinite"/><polygon points="978,9 1022,9 1000,40" fill="#00f0ff"/></g>
  </g>

