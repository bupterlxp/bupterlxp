<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 340" width="360" height="340" fill="none" font-family="'Courier New',monospace">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#00f0ff"/><stop offset="0.5" stop-color="#a855f7"/><stop offset="1" stop-color="#ff00e5"/></linearGradient>
    <filter id="fg" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="fs" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="1.3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path class="grd" d="M30 0 L0 0 0 30" fill="none" stroke="#0f1d33" stroke-width="1"/></pattern>
    <style>.bg{fill:#07070d}.grd{stroke:#0f1d33}.lbl{fill:#cfe3ff}
      @media (prefers-color-scheme: light){.bg{fill:#f4f8fe}.grd{stroke:#dbe6f5}.lbl{fill:#2b4a73}}</style>
  </defs>
  <rect class="bg" x="3" y="3" width="354" height="334" rx="16" fill="#07070d" stroke="url(#g1)" stroke-width="2"/>
  <rect x="3" y="3" width="354" height="334" rx="16" fill="url(#grid)" opacity="0.5"/>
  <text x="30" y="40" font-size="16" font-weight="bold" fill="#00f0ff" filter="url(#fs)" letter-spacing="2">// SKILL CUBE</text>

  <!-- orbit -->
  <ellipse cx="180" cy="185" rx="130" ry="46" fill="none" stroke="#1b3a5a" stroke-width="1" opacity="0.5"/>
  <g><animateTransform attributeName="transform" type="rotate" from="0 180 185" to="360 180 185" dur="6s" repeatCount="indefinite"/><circle cx="310" cy="185" r="4" fill="#00f0ff" filter="url(#fs)"/></g>
  <g><animateTransform attributeName="transform" type="rotate" from="180 180 185" to="540 180 185" dur="6s" repeatCount="indefinite"/><circle cx="310" cy="185" r="4" fill="#ff00e5" filter="url(#fs)"/></g>

  <!-- isometric cube (gentle 3D wobble) -->
  <g filter="url(#fg)">
    <animateTransform attributeName="transform" type="rotate" values="-5 180 185;5 180 185;-5 180 185" dur="7s" repeatCount="indefinite"/>
    <!-- top -->
    <polygon points="180,95 252,137 180,179 108,137" fill="#1b2c52" stroke="url(#g1)" stroke-width="2"/>
    <!-- left -->
    <polygon points="108,137 180,179 180,263 108,221" fill="#101b34" stroke="url(#g1)" stroke-width="2"/>
    <!-- right -->
    <polygon points="252,137 180,179 180,263 252,221" fill="#16233f" stroke="url(#g1)" stroke-width="2"/>
    <text x="180" y="143" text-anchor="middle" font-size="22" font-weight="bold" fill="#00f0ff">AI</text>
    <text x="144" y="212" text-anchor="middle" font-size="20" font-weight="bold" fill="#a855f7">PY</text>
    <text x="216" y="212" text-anchor="middle" font-size="22" font-weight="bold" fill="#ff00e5">λ</text>
  </g>

  <text class="lbl" x="180" y="312" text-anchor="middle" font-size="13" fill="#cfe3ff">Python · PyTorch · LLM · Agent</text>
</svg>
