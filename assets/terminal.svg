<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 330" width="840" height="330" fill="none">
  <defs>
    <filter id="tg" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="1.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="tbar" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#00f0ff"/><stop offset="1" stop-color="#ff00e5"/></linearGradient>
  </defs>

  <!-- window -->
  <rect x="2" y="2" width="836" height="326" rx="14" fill="#0a0a12" stroke="url(#tbar)" stroke-width="2"/>
  <rect x="2" y="2" width="836" height="40" rx="14" fill="#12121f"/>
  <rect x="2" y="28" width="836" height="14" fill="#12121f"/>
  <circle cx="30" cy="22" r="6" fill="#ff5f57"/><circle cx="52" cy="22" r="6" fill="#febc2e"/><circle cx="74" cy="22" r="6" fill="#28c840"/>
  <text x="420" y="27" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" fill="#6a7a99">xinping@bupt: ~/research</text>

  <g font-family="'Courier New',monospace" font-size="17" filter="url(#tg)">
    <text x="28" y="80" fill="#28c840">$ whoami<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.2s" fill="freeze"/></text>
    <text x="28" y="108" fill="#cfe3ff">→ <tspan fill="#00f0ff" font-weight="bold">Xinping Lei</tspan> · LLM / Agent Researcher @ BUPT<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.7s" fill="freeze"/></text>

    <text x="28" y="146" fill="#28c840">$ cat research_focus.txt<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.2s" fill="freeze"/></text>
    <text x="28" y="174" fill="#a855f7">→ Multi-Agent Systems · Agentic Orchestration<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.7s" fill="freeze"/></text>
    <text x="28" y="200" fill="#a855f7">→ Agentic Coding &amp; Evaluation<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.1s" fill="freeze"/></text>
    <text x="28" y="226" fill="#a855f7">→ LLM Reasoning · Alignment · Idea Generation<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.5s" fill="freeze"/></text>

    <text x="28" y="264" fill="#28c840">$ ./mission --now<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.1s" fill="freeze"/></text>
    <text x="28" y="292" fill="#ff4fd8" font-weight="bold">→ build agents that actually work.<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.6s" fill="freeze"/><tspan> </tspan><tspan fill="#00f0ff">█<animate attributeName="opacity" values="1;0;1" dur="1s" begin="4s" repeatCount="indefinite"/></tspan></text>
  </g>
</svg>
