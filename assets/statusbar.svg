    <rect x="422" y="20" width="16" height="16" rx="2" fill="#00f0ff" filter="url(#stg)"><animate attributeName="opacity" from="0.15" to="1" dur="0.4s" begin="0.5s" fill="freeze"/></rect>
    <rect x="444" y="20" width="16" height="16" rx="2" fill="#a855f7" filter="url(#stg)"><animate attributeName="opacity" from="0.15" to="1" dur="0.4s" begin="0.8s" fill="freeze"/></rect>
