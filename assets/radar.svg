<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 400" width="440" height="400" fill="none">
  <defs>
    <linearGradient id="rn" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#00f0ff"/><stop offset="0.5" stop-color="#a855f7"/><stop offset="1" stop-color="#ff00e5"/></linearGradient>
    <filter id="rg" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="rgs" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="1.3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="440" height="400" fill="#07070d"/>

  <text x="220" y="30" text-anchor="middle" font-family="'Courier New',monospace" font-size="16" font-weight="bold" fill="#00f0ff" filter="url(#rgs)" letter-spacing="3">// SKILL RADAR</text>

  <!-- grid rings -->
  <g stroke="#1b2b45" stroke-width="1" fill="none">
    <polygon points="220,65 336.9,132.5 336.9,267.5 220,335 103.1,267.5 103.1,132.5"/>
    <polygon points="220,110.9 297.2,155.4 297.2,244.6 220,289.1 142.8,244.6 142.8,155.4"/>
    <polygon points="220,155.45 258.6,177.7 258.6,222.3 220,244.55 181.4,222.3 181.4,177.7"/>
  </g>
  <!-- axes -->
  <g stroke="#12243d" stroke-width="1">
    <line x1="220" y1="200" x2="220" y2="65"/><line x1="220" y1="200" x2="336.9" y2="132.5"/><line x1="220" y1="200" x2="336.9" y2="267.5"/>
    <line x1="220" y1="200" x2="220" y2="335"/><line x1="220" y1="200" x2="103.1" y2="267.5"/><line x1="220" y1="200" x2="103.1" y2="132.5"/>
  </g>

  <!-- data polygon: draw-on + fill fade -->
  <polygon points="220,71.75 327.5,137.9 319.4,257.4 220,308 114.8,260.75 128.8,147.35" fill="url(#rn)" fill-opacity="0" stroke="url(#rn)" stroke-width="2.5" filter="url(#rg)" stroke-dasharray="1200" stroke-dashoffset="1200">
    <animate attributeName="stroke-dashoffset" from="1200" to="0" dur="1.6s" begin="0.3s" fill="freeze"/>
    <animate attributeName="fill-opacity" from="0" to="0.32" dur="1s" begin="1.6s" fill="freeze"/>
  </polygon>

  <!-- vertex dots -->
  <g fill="#00f0ff" filter="url(#rgs)">
    <circle cx="220" cy="71.75" r="3.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="327.5" cy="137.9" r="3.5" fill="#a855f7"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="319.4" cy="257.4" r="3.5" fill="#ff00e5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="308" r="3.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="114.8" cy="260.75" r="3.5" fill="#a855f7"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="128.8" cy="147.35" r="3.5" fill="#ff00e5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- labels -->
  <g font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#cfe3ff">
    <text x="220" y="55" text-anchor="middle">LLM</text>
    <text x="348" y="132" text-anchor="start">Agent</text>
    <text x="348" y="272" text-anchor="start">Agentic Coding</text>
    <text x="220" y="358" text-anchor="middle">Reasoning</text>
    <text x="92" y="272" text-anchor="end">Ideation</text>
    <text x="92" y="132" text-anchor="end">Systems</text>
  </g>
</svg>
