name: Profile Refresh
on:
  schedule: [{cron: "17 22 * * *"}]   # 每天刷新一次（UTC 22:17 ≈ 北京 06:17）
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate self-hosted SVG assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: bupterlxp
        run: python3 scripts/gen_assets.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/dashboard.svg
          git diff --staged --quiet || git commit -m "chore: auto-refresh dashboard"
          git push
